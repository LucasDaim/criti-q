<ion-content [fullscreen]="true">
  <ion-toolbar class="topo">
    <ion-img class="logo" src="/assets/logo.PNG" alt=""></ion-img>
    <div class="icons">
      <ion-icon routerLink="/publica" name="add-outline" id="btn"></ion-icon>
      <ion-icon routerLink="/notifica" name="notifications-outline" id="btn2"></ion-icon>
    </div>
  </ion-toolbar>
  
  <ion-item *ngFor="let user of data">
    {{ user.name }}
  </ion-item>
</ion-content>
