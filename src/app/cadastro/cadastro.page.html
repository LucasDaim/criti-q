<ion-content [fullscreen]="true">
  <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
    <div>
      <h1 class="titulo">Cadastro</h1>
    </div>
    
    <div>
      <ion-input 
        formControlName="nome" 
        label="Nome" 
        label-placement="floating" 
        fill="outline" 
        placeholder="Nome">
      </ion-input>
      <ion-text *ngIf="cadastroForm.get('nome')?.invalid && cadastroForm.get('nome')?.touched" color="danger">
        O nome é obrigatório.
      </ion-text>
    </div> 
    <br>

    <div>
      <ion-input 
        formControlName="usuario" 
        label="Usuário" 
        label-placement="floating" 
        fill="outline" 
        placeholder="Usuário">
      </ion-input>
      <ion-text *ngIf="cadastroForm.get('usuario')?.invalid && cadastroForm.get('usuario')?.touched" color="danger">
        O usuário é obrigatório.
      </ion-text>
    </div> 
    <br>

    <div>
      <ion-input 
        formControlName="email" 
        label="Email" 
        label-placement="floating" 
        fill="outline" 
        placeholder="Email">
      </ion-input>
      <ion-text *ngIf="cadastroForm.get('email')?.invalid && cadastroForm.get('email')?.touched" color="danger">
        O email é inválido.
      </ion-text>
    </div> 
    <br>

    <div>
      <ion-input 
        formControlName="senha" 
        type="password" 
        label="Senha" 
        label-placement="floating" 
        fill="outline" 
        placeholder="Senha">
      </ion-input>
      <ion-text *ngIf="cadastroForm.get('senha')?.invalid && cadastroForm.get('senha')?.touched" color="danger">
        A senha é obrigatória.
      </ion-text>
    </div> 
    <br>

    <ion-button 
      type="submit" 
      [disabled]="cadastroForm.invalid" 
      class="btn">
      Cadastrar
    </ion-button>

  </form>

  <ion-text routerLink="/login">
    Já possui uma conta? Faça login
  </ion-text>
</ion-content>
