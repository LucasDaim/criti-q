<ion-content [fullscreen]="true">
  <h1 class="titulo">Cadastro</h1>
   <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input type="email" [(ngModel)]="email" required></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Senha</ion-label>
    <ion-input type="password" [(ngModel)]="password" required></ion-input>
  </ion-item>

  <ion-button color="dark" expand="block" (click)="register()">Cadastrar</ion-button>
  <ion-text expand="block" (click)="redirecionar_login()">Já tem uma conta? Faça login</ion-text>
  
</ion-content>
